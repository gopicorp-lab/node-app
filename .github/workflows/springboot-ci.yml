name: Spring Boot CI Pipeline

on:
  push:
    branches:
      - spring
  pull_request:
    branches:
      - main


jobs:

  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Maven Compile
        run: mvn clean compile


  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest

    needs:
      - build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests
        run: mvn clean test


  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    needs:
      - unit-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      - name: Build Docker Image
        run: |
          docker build \
          -t spring-boot-app:${{ github.sha }} .


      # Save image for next job
      - name: Save Docker Image
        run: |
          docker save \
          spring-boot-app:${{ github.sha }} \
          -o spring-boot-app.tar


      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-image
          path: spring-boot-app.tar



  image-scan:
    name: Scan Docker Image
    runs-on: ubuntu-latest

    needs:
      - docker-build

    steps:
      - name: Download Docker Image
        uses: actions/download-artifact@v4
        with:
          name: spring-boot-image


      - name: Load Docker Image
        run: |
          docker load \
          -i spring-boot-app.tar


      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: spring-boot-app:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH



  docker-push:
    name: Docker Push
    runs-on: ubuntu-latest

    needs:
      - image-scan

    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      - name: Download Docker Image
        uses: actions/download-artifact@v4
        with:
          name: spring-boot-image


      - name: Load Docker Image
        run: |
          docker load \
          -i spring-boot-image.tar


      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      - name: Tag Docker Image
        run: |
          docker tag \
          spring-boot-app:${{ github.sha }} \
          ${{ secrets.DOCKER_USERNAME }}/spring-boot-app:${{ github.sha }}

          docker tag \
          spring-boot-app:${{ github.sha }} \
          ${{ secrets.DOCKER_USERNAME }}/spring-boot-app:latest


      - name: Push Docker Image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/spring-boot-app:${{ github.sha }}

          docker push \
          ${{ secrets.DOCKER_USERNAME }}/spring-boot-app:latest