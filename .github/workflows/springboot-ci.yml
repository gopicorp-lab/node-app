name: Spring Boot CI Pipeline

on:
  push:
    branches:
      - spring
  pull_request:
    branches:
      - main


jobs:

  # Job 1: Build Spring Boot Application
  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Maven Compile
        run: mvn clean compile


  # Job 2: Unit Tests
  unit-test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    needs:
      - build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Unit Tests
        run: mvn clean test


  # Job 3: Docker Build and Push
  docker-build-push:
    name: Docker Build and Push
    runs-on: ubuntu-latest

    needs:
      - unit-test

    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      # Login to Docker Hub
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      # Build Docker Image
      - name: Docker Build
        run: |
          docker build \
          -t spring-boot-app:${{ github.sha }} .


      # Tag Docker Image
      - name: Docker Tag
        run: |
          docker tag \
          spring-boot-app:${{ github.sha }} \
          ${{ secrets.DOCKER_USERNAME }}/spring-boot-app:${{ github.sha }}

          docker tag \
          spring-boot-app:${{ github.sha }} \
          ${{ secrets.DOCKER_USERNAME }}/spring-boot-app:latest


      # Push Docker Image
      - name: Docker Push
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/spring-boot-app:${{ github.sha }}

          docker push \
          ${{ secrets.DOCKER_USERNAME }}/spring-boot-app:latest