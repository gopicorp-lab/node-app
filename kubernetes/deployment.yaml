apiVersion: apps/v1
kind: Deployment

metadata:
  name: node-app

spec:
  replicas: 3

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: node-app

  template:
    metadata:
      labels:
        app: node-app

    spec:
      nodeSelector:
        nodepool: agent

      volumes:
        - name: app-storage
          persistentVolumeClaim:
            claimName: node-app-pvc

      containers:
        - name: node-app
          image: gopicorp/node-app:v3

          ports:
            - containerPort: 3000

          volumeMounts:
            - name: app-storage
              mountPath: /app/data

          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5