apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-actions-deployer
  namespace: default

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: github-actions-deployer-role
  namespace: default

rules:
- apiGroups: ["", "apps"]
  resources:
    - pods
    - services
    - deployments
    - replicasets
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-deployer-binding
  namespace: default

subjects:
- kind: ServiceAccount
  name: github-actions-deployer
  namespace: default

roleRef:
  kind: Role
  name: github-actions-deployer-role
  apiGroup: rbac.authorization.k8s.io